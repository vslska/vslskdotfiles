[accessibility]
ui_scale = 0.90000000596046448

[bar.default]
background_opacity = 0.8399999812245369
scale = 0.90000000596046448

[brightness]
minimum_brightness = 0.21999999508261681

[desktop_widgets]
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
background_opacity = 0.40999999083578587
cross_axis_padding = 0
icon_size = 16
launcher_icon = "time-duration-0"
launcher_position = "start"
main_axis_padding = 22
position = "left"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@HDMI-A-1", "lockscreen-login-box@eDP-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 961.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 768.0
    cy = 841.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[plugin_settings."noctalia/notes"]
notes_dir = "~/Documents/Notes"

[plugins]
enabled = []

[shell]
font_family = "JetBrainsMonoNL Nerd Font Mono"

    [shell.launcher]
    compact = true

    [shell.panel]
    launcher_placement = "attached"

    [shell.shadow]
    alpha = 0.50999998860061169

[theme]
builtin = "Catppuccin"
community_palette = "Catppuccin Macchiato Lavender"
mode = "dark"
source = "community"
wallpaper_scheme = "m3-content"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "gtk4" ]
    community_ids = [ "steam" ]

[wallpaper]
directory = "/home/vslska/my/git/dotfiles/img"
directory_dark = "/home/vslska/my/git/dotfiles/img"
directory_light = "/home/vslska/my/git/dotfiles/img"

    [wallpaper.automation]
    enabled = true
    interval_seconds = 73

    [wallpaper.default]
    path = "/home/vslska/my/git/dotfiles/img/26.png"

    [wallpaper.last]
    path = "/home/vslska/my/git/dotfiles/img/26.png"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/vslska/my/git/dotfiles/img/26.png"

    [wallpaper.monitors.eDP-1]
    path = "/home/vslska/my/git/dotfiles/img/26.png"
